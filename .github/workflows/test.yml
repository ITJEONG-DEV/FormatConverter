name: Tests

# dev/main 에 push 하거나 PR 을 열면 자동으로 전체 테스트를 실행한다.
# (개발은 dev 브랜치, 배포 시에만 main 머지)
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen   # 헤드리스 러너에서 QML 로드 가능하도록

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download ffmpeg (통합 테스트용)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName bin/ffmpeg.exe  -Force
          Copy-Item $fp.FullName bin/ffprobe.exe -Force

      - name: Run tests (단위 + GUI + 통합)
        run: python -m pytest
