name: Release

# vX.Y.Z 형태의 버전 태그를 push하면 exe를 빌드해 GitHub Release로 자동 배포한다.
#   예)  git tag v1.0.0
#        git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Release 생성/자산 업로드 권한

env:
  PYTHONUTF8: "1"        # 러너 콘솔 인코딩과 무관하게 Python I/O를 UTF-8로

jobs:
  # 배포 게이트: 테스트가 통과해야만 빌드/릴리스가 진행된다.
  test:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download ffmpeg (통합 테스트용)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName bin/ffmpeg.exe  -Force
          Copy-Item $fp.FullName bin/ffprobe.exe -Force

      - name: Run tests
        run: python -m pytest

  build-and-release:
    needs: test        # 테스트 통과 후에만 실행 → 깨진 채 배포되는 것을 막음
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 주석 태그 메시지(%(contents)) 읽기 위해 전체 히스토리+태그 필요
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          Set-Content -Path version.py -Value "__version__ = `"$v`"" -Encoding utf8
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Building version $v"

      - name: Download ffmpeg (for full build)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName bin/ffmpeg.exe  -Force
          Copy-Item $fp.FullName bin/ffprobe.exe -Force

      - name: Build (full + lite)
        run: python build.py all

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release  | Out-Null
          # full: 폴더형 전체를 zip
          Compress-Archive -Path dist/FormatConverter/* -DestinationPath "release/FormatConverter-full-$env:VERSION.zip" -Force
          # lite: 단일 exe + ffmpeg 준비 안내 동봉
          New-Item -ItemType Directory -Force lite_pkg | Out-Null
          Copy-Item dist/FormatConverter-lite.exe lite_pkg/ -Force
          Copy-Item "docs/lite-ffmpeg-안내.md"     lite_pkg/ -Force
          Compress-Archive -Path lite_pkg/* -DestinationPath "release/FormatConverter-lite-$env:VERSION.zip" -Force
          Get-ChildItem release

      - name: Compose release body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = "${{ env.VERSION }}"
          # actions/checkout은 태그를 경량(커밋 SHA)으로만 가져와 주석 메시지가 사라진다.
          # 주석 태그 객체를 명시적으로 다시 받아와야 %(contents)가 태그 메시지를 반환한다.
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}" 2>$null
          $commitMsg = (git tag -l --format='%(*contents)' $tag | Out-String).Trim()
          $msg = (git tag -l --format='%(contents)' $tag | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($msg) -or $msg.Trim() -eq $tag -or $msg.Trim() -eq $commitMsg.Trim()) {
            $msg = "- 개선 및 버그 수정"
          }
          $tpl = Get-Content -Raw -Encoding utf8 docs/release_body_template.md
          $out = $tpl.Replace('{{TAG}}', $tag).Replace('{{VERSION}}', $ver).Replace('{{CHANGES}}', $msg.Trim())
          Set-Content -Path release_body.md -Value $out -Encoding utf8
          Write-Host "----- release body -----"
          Get-Content release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FormatConverter ${{ github.ref_name }}"
          files: release/*.zip
          generate_release_notes: true   # body 뒤에 커밋 기반 변경내역 자동 추가
          body_path: release_body.md

  # macOS 앱(.app) 빌드 → 같은 릴리스에 자산 추가.
  # Windows 릴리스가 먼저 생성된 뒤(needs) zip 만 덧붙인다.
  # 참고: macos-latest 는 Apple Silicon(arm64) 러너 → 산출물도 arm64 전용.
  #       ffmpeg 는 번들하지 않으며, 사용자는 brew install ffmpeg 로 연동한다(docs/macos-안내.md).
  build-macos:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "__version__ = \"$VER\"" > version.py
          echo "VERSION=$VER" >> "$GITHUB_ENV"
          echo "Building macOS version $VER"

      - name: Build (.app)
        run: python build.py

      - name: Package .app (ditto)
        run: |
          mkdir -p release
          STAGE="FormatConverter-macos-$VERSION"
          mkdir -p "$STAGE"
          cp -R "dist/FormatConverter.app" "$STAGE/"
          cp "docs/macos-안내.md" "$STAGE/"
          # ditto 는 .app 의 심볼릭링크·권한·리소스포크를 보존한다(zip 보다 안전).
          ditto -c -k --keepParent "$STAGE" "release/FormatConverter-macos-arm64-$VERSION.zip"
          ls -la release

      - name: Upload macOS asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.zip
